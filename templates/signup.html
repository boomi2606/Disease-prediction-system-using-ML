<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

<h1>Create Account</h1>

{% with messages = get_flashed_messages() %}
{% if messages %}
<p class="msg">{{ messages[0] }}</p>
{% endif %}
{% endwith %}

<form method="POST">

<input type="text"
       name="name"
       placeholder="Name"
       required>

<input type="email"
       name="email"
       placeholder="Email"
       required>

<input type="password"
       name="password"
       placeholder="Password"
       required>

<button type="submit">
Signup
</button>

</form>

<p>
Already have an account?
<a href="/">Login</a>
</p>

</div>

</body>
</html>
