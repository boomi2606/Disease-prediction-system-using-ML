<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disease Prediction System</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #0A2647;
            color: white;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar{
            display:flex;
            justify-content:space-between;
            padding:20px 40px;
            background:rgba(0,0,0,0.3);
        }

        .logo{
            font-size:24px;
            font-weight:bold;
        }

        .navbar ul{
            list-style:none;
            display:flex;
            gap:25px;
        }

        .navbar a{
            text-decoration:none;
            color:white;
            font-weight:bold;
            transition:.3s;
        }

        .navbar a:hover{
            color:yellow;
        }

        .hero{
            text-align: center;
            margin-top: 120px;
            padding: 20px;
        }

        .hero h1{
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero p{
            font-size: 20px;
            margin-bottom: 30px;
        }

        .btn{
            display: inline-block;
            padding: 12px 25px;
            background: #2196F3;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin: 10px;
        }

        .btn:hover{
            background: #1976D2;
        }
    </style>
</head>
<body>
<!-- Navbar -->
<div class="navbar">
    <h2>MediPredict</h2>
    <div>
    <ul>
       <li><a href="{{ url_for('home') }}">Home</a></li>
       <li><a href="{{ url_for('signup') }}">Sign up</a></li>
       <li><a href="{{ url_for('login') }}">Log in</a></li>
       <li><a href="{{ url_for('about') }}">About</a></li>
    </ul>
    </div>
</div>

    <section class="hero">
        <h1>Disease Prediction System</h1>
        <p>Predict diseases based on symptoms using Machine Learning.</p>
        <div class="buttons">
            <a href="/login" class="btn">Login</a>
            <a href="/signup" class="btn">Sign Up</a>
        </div>
        
    </section>

</body>
</html>
